name: PR Validation

on:
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

# Prevent concurrent runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: Build and Validate Package
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Create artifacts directory
        run: mkdir -p ./artifacts/packages

      - name: Build and pack main library
        run: |
          dotnet restore src/A10w.Aspire.Hosting.ExternalAks.csproj
          dotnet build src/A10w.Aspire.Hosting.ExternalAks.csproj --no-restore --configuration Release
          dotnet pack src/A10w.Aspire.Hosting.ExternalAks.csproj --no-build --configuration Release --output ./artifacts/packages

      - name: Restore solution dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal
        continue-on-error: false

      - name: Validate package contents
        run: |
          echo "📦 Package created successfully!"
          ls -lh ./artifacts/packages/
          
          # Extract and list package contents
          if [ -f ./artifacts/packages/*.nupkg ]; then
            echo "✅ NuGet package found"
            unzip -l ./artifacts/packages/*.nupkg | head -50
          else
            echo "❌ No NuGet package found!"
            exit 1
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package-pr-${{ github.event.pull_request.number }}
          path: ./artifacts/packages/*.nupkg
          retention-days: 7

      - name: Summary
        run: |
          echo "✅ PR validation completed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- **PR Number:** #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.head_ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
